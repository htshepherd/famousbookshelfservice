# ============================================================
# 名人书架 (Famous Bookshelf) — 多环境公共配置
# ============================================================

server:
  port: 8081

spring:
  application:
    name: famousbookshelfservice
  profiles:
    active: dev # 默认激活 dev 环境配置文件 (application-dev.yml)

  # -------------------- Jackson 全局配置 --------------------
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # -------------------- 文件上传限制 --------------------
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# -------------------- MyBatis-Plus 的全局公共配置 --------------------
mybatis-plus:
  configuration:
    # 开启驼峰映射 (author_id -> authorId)
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 逻辑删除字段配置
      logic-delete-field: isDeleted
      logic-delete-value: true
      logic-not-delete-value: false
      # 主键策略：数据库自增
      id-type: auto
  # Mapper XML 文件路径（如果后续需要自定义 XML）
  mapper-locations: classpath*:/mapper/**/*.xml
