# ============================================================
# 名人书架 (Famous Bookshelf) — 生产环境配置
# ============================================================

spring:
  # -------------------- 数据源 (Prod) --------------------
  # 生产环境通常会使用环境变量来注入这些敏感属性，例如 ${DB_URL}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

# -------------------- MyBatis-Plus (Prod) --------------------
mybatis-plus:
  configuration:
    # 生产环境关闭控制台 SQL 输出以提升性能及安全性
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# -------------------- 日志级别 (Prod) --------------------
logging:
  level:
    root: INFO
    com.famousbookshelf: INFO
    com.baomidou.mybatisplus: WARN

# -------------------- Swagger (Prod) --------------------
swagger:
  enabled: false

# -------------------- CORS (Prod) --------------------
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://famousbookshelf.com}


